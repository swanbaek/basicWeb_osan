    <!-- 클릭할 영역을 정의하는 맵 -->
    <map name="mymap">
        <!-- 사각형(rect) 좌표: 시작점(x,y - left,top) 끝점(x2,y2-right,bottom) -->
        <area shape="rect" coords="16,16,53,53" href="http://www.naver.com" alt="네이버로 가요">
        <!-- 원(circle) 좌표: 중심점(centerX, centerY),반지름(radius) -->
        <area shape="circle" coords="98,32,24" href="http://www.daum.net" alt="다음으로 가요">
        <!-- 다각형(poly) 좌표: x1,y1, x2,y2, x3,y3,... -->
        <area shape="poly" coords="156,13,132,50,180,50" href="http://www.google.com" alt="구글로 가요">
