<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="Generator" content="EditPlus®">
        <meta name="Author" content="">
        <meta name="Keywords" content="">
        <meta name="Description" content="">
        <title>처음만드는 HTML</title>
    </head>
    <body>
        <h1>Hello HTML</h1>
        <h2>안녕 HTML</h2>
        <!--이것은 주석(comment)입니다. 
        브라우저는 보지 않지만 개발자만 볼 수 있게 내용을 기술하는 기능을 주석이라고 합니다
        브라우저에 출력되지 않습니다이
        이 아래부터는 자기소개 영역입니다 -->
        <hr>
        <!-- p: paragraph  문단 태그
            br : break 줄바꿈 태그
        -->
        <p>첫 번째 문단입니다. 위아래로 간격이 생깁니다.</p>
        <p>두 번째 문단입니다. 첫 번째 문단과 거리가 있죠?</p>

        <hr> 
        <p>
            이것은 한 문단입니다.<br>
            줄을 바꾸고 싶을 때 사용해요.<br>
            간격이 아주 좁죠?
        </p>
        안녕하세요? 김민준 입니다
        저는 웹개발을 처음 배우는 초보자 입니다
        <hr>
        <h3>안녕하세요? 김민준 입니다</h3>
        <p>저는 웹 개발을 처음 배우는 초보자입니다</p>
    </body>
</html>
