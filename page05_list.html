<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>page05_list.html</title>
</head>
<body>
    <h1>목록 태그 (순서있는 목록/순서없는 목록)- block 요소</h1>
    <h2>순서있는 목록 - ol > li</h2>
    <!-- ordered list
     ol태그 속성
     - type : 1 (디폴트), A, a, I, i
     - start: 시작값을 지정(숫자)
      -->
    <ol start="3" type="i">
        <li>Facebook</li>
        <li>Instagram</li>
        <li>Linked In</li>
    </ol>

    <hr color="red">
    <!-- unordered list
        - type : disc (디폴트값), circle, square 
    -->
    <h2>순서없는 목록 - ul > li</h2>
    <ul type="square">
        <li>Python</li>
        <li>Prompt</li>
        <li>VibeCoding</li>
    </ul>
    <hr color="blue">    
<h2>중첩 리스트  (목록 안에 목록)</h2>
<ul>
    <li>Coffee</li>
    <li>Tea
        <ul type="square">
            <li>Black Tea</li>
            <li>Green Tea</li>
        </ul>
    </li>
    <li>Milk</li>
</ul>
<br><br><br><br><br><br><br><br><br><br>

</body>
</html>
<!-- page05_list.html -->
