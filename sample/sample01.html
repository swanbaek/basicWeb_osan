<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>카페 가입 신청</title>
</head>
<body>
<h1>☕ 카페 가입 신청</h1>
<form>
    <fieldset>
        <legend>가입 신청 정보</legend>
        <p>
            <label for="name">이름</label><br>
            <input type="text" id="name" placeholder="이름을 입력하세요">
        </p>
        <p>
            <label for="phone">연락처</label><br>
            <input type="tel" id="phone" placeholder="010-1234-5678">
        </p>
        <p>
            <label for="email">이메일</label><br>
            <input type="email" id="email" placeholder="abc@test.com">
        </p>
        <p>
            <label for="memo">가입 인사</label><br>
            <textarea id="memo" rows="5" cols="40"
                placeholder="간단한 자기소개를 입력하세요."></textarea>
        </p>
    </fieldset>
    <p>
        <button type="submit">가입 신청</button>
        <button type="reset">다시 작성</button>
    </p>
</form>
</body>
</html>
