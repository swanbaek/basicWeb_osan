<body>
    <h1>iframe - Internal Frame (내부 프레임)</h1>
    iframe태그 사용. 속성은 width, height, src
    <hr>
    <h2>회원가입-SignUp</h2>
    <iframe src="sample/agree.html" width="80%" height="300"></iframe>
    <br>
    <label for="agree">
        <input type="checkbox" name="agreeChk" id="agree">이용약관에 동의합니다
    </label>
    <br>
    <hr color="red">
    <div style="width:560px;margin:auto;">
        <iframe width="560" height="315"
        src="https://www.youtube.com/embed/vR_MvntdrSY?si=KhMhS9IxRzVJ_AEu" 
        title="YouTube video player" frameborder="0" 
        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen>
        </iframe>
     </div>
</body>
